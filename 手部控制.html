<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>手部控制粒子系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(135deg, #0a0a2a 0%, #000000 100%);
            font-family: 'Segoe UI', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
        }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }

        /* UI Overlay */
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10;
            pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 2rem;
        }

        /* Loading Screen */
        .loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.9); font-size: 1.5rem; letter-spacing: 2px;
            transition: opacity 0.5s ease-out; text-align: center;
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(20px);
            padding: 2rem 3rem; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .loading.hidden { opacity: 0; pointer-events: none; }

        /* Main Controls */
        .controls {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            pointer-events: auto; display: flex; gap: 15px;
        }

        button {
            background: rgba(40, 40, 80, 0.4); border: 1px solid rgba(100, 150, 255, 0.4);
            color: white; padding: 14px 28px; border-radius: 30px; cursor: pointer;
            backdrop-filter: blur(20px); text-transform: uppercase; font-size: 0.9rem; letter-spacing: 1px;
            transition: all 0.3s ease; font-weight: 500;
        }
        button:hover {
            background: rgba(80, 120, 255, 0.4);
            box-shadow: 0 0 20px rgba(100, 150, 255, 0.6);
            transform: translateY(-2px);
            border-color: rgba(150, 200, 255, 0.8);
        }
        button:active { transform: translateY(1px); }

        /* Camera Permission Prompt */
        #permission-prompt {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(20, 20, 40, 0.9); backdrop-filter: blur(20px);
            padding: 2.5rem; border-radius: 25px; text-align: center;
            color: white; pointer-events: auto; z-index: 20;
            border: 1px solid rgba(100, 150, 255, 0.4);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            max-width: 90%; width: 400px;
        }
        #permission-prompt h2 { margin-bottom: 1rem; color: #6a93cb; }
        #permission-prompt p { font-size: 0.95rem; line-height: 1.6; opacity: 0.9; margin-bottom: 1.5rem; }
        #permission-prompt button { margin: 0 10px; }

        /* Status Indicator */
        .status {
            position: absolute; top: 20px; right: 20px;
            background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(10px);
            padding: 10px 20px; border-radius: 20px; color: white; font-size: 0.8rem;
            pointer-events: auto; z-index: 15;
        }
        .status.connected { color: #4CAF50; }
        .status.disconnected { color: #f44336; }

        /* Instructions Panel */
        .instructions {
            position: absolute; top: 20px; left: 20px;
            background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(10px);
            padding: 15px 20px; border-radius: 15px; color: white; font-size: 0.8rem;
            pointer-events: auto; z-index: 15; max-width: 250px;
        }
        .instructions h3 { margin-bottom: 10px; color: #6a93cb; font-size: 0.9rem; }
        .instructions ul { padding-left: 15px; }
        .instructions li { margin-bottom: 5px; opacity: 0.9; }

        /* Camera feed for debug (hidden by default) */
        .input_video { display: none; }

        /* Responsive */
        @media (max-width: 768px) {
            .instructions { display: none; }
            #ui-layer { padding: 1rem; }
            .controls { bottom: 20px; }
        }
    </style>
</head>
<body>

    <!-- Status Indicator -->
    <div id="status-indicator" class="status disconnected">正在初始化...</div>

    <!-- Instructions -->
    <div class="instructions">
        <h3>使用说明</h3>
        <ul>
            <li>张开手掌：展开粒子系统</li>
            <li>握拳：收缩粒子系统</li>
            <li>移动手部：控制粒子流动</li>
        </ul>
    </div>

    <div id="ui-layer">
        <div id="loader" class="loading">正在初始化神经引擎与粒子系统...</div>
        <div class="controls">
            <button id="fs-btn" style="display: none;">进入全屏沉浸模式</button>
            <button id="settings-btn" style="display: none;">系统设置</button>
            <button id="reset-btn" style="display: none;">重置状态</button>
        </div>
    </div>

    <video class="input_video"></video>

    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <script>
        // --- Configuration ---
        const PARTICLE_COUNT = 150000; // 高密度粒子
        const SATURN_RADIUS = 20;
        const RING_INNER = 30;
        const RING_OUTER = 80;
        const CHAOS_THRESHOLD = 0.85; // 当缩放超过这个比例，开始炸裂

        // --- Global Variables ---
        let scene, camera, renderer, composer;
        let particleSystem, uniforms;
        let targetZoom = 0; // 0 = closed, 1 = open
        let currentZoom = 0;
        let isHandDetected = false;

        // --- Shaders (The Soul of the System) ---

        const vertexShader = `
            uniform float uTime;
            uniform float uZoom; // 0.0 to 1.0 (Hand Openness)

            attribute float size;
            attribute float speed;
            attribute float radius;
            attribute float angleOffset;
            attribute float randomness; // 0.0 for core, 1.0 for rings
            attribute vec3 randomDir;   // Random direction for chaos

            varying vec3 vColor;
            varying float vAlpha;

            // Pseudo-random function
            float random(vec2 st) {
                return fract(sin(dot(st.xy, vec2(12.9898,78.233))) * 43758.5453123);
            }

            // HSV to RGB conversion function
            vec3 hsv2rgb(vec3 c) {
                vec4 K = vec4(1.0, 2.0 / 3.0, 1.0 / 3.0, 3.0);
                vec3 p = abs(fract(c.xxx + K.xyz) * 6.0 - K.www);
                return c.z * mix(K.xxx, clamp(p - K.xxx, 0.0, 1.0), c.y);
            }

            void main() {
                // 1. Keplerian Motion Logic
                // Speed is intrinsic (pre-calculated based on 1/sqrt(r)), but we animate it with time
                float currentAngle = angleOffset + (speed * uTime * 0.5);

                // Normal Orbit Position
                vec3 orbitPos;
                if(radius < ${SATURN_RADIUS.toFixed(1)} + 1.0) {
                    // Core (Sphere) rotation
                    float cX = radius * sin(currentAngle) * cos(randomness * 3.14);
                    float cY = radius * cos(currentAngle);
                    float cZ = radius * sin(currentAngle) * sin(randomness * 3.14);
                    orbitPos = vec3(cX, cY, cZ);
                } else {
                    // Ring (Disc) rotation - Flat on XZ plane
                    orbitPos = vec3(
                        radius * cos(currentAngle),
                        (randomness - 0.5) * 2.0, // Thin variation in Y
                        radius * sin(currentAngle)
                    );
                }

                // 2. Camera Zoom & Position Logic
                // We move particles towards camera based on uZoom
                // Base distance is far, max zoom is very close (inside the chaos)
                vec3 pos = orbitPos;

                // 3. Chaos / Brownian Motion Logic
                // Activated when uZoom is high
                float chaosLevel = smoothstep(0.7, 1.0, uZoom);

                if (chaosLevel > 0.0) {
                    // High frequency jitter
                    float jitter = sin(uTime * 20.0 + radius) * 5.0 * chaosLevel;
                    vec3 chaosPos = pos + (randomDir * (20.0 + jitter) * chaosLevel * 2.0);

                    // Break the orbit structure
                    pos = mix(pos, chaosPos, chaosLevel);
                }

                // Apply Zoom scale (Scaling the universe towards the camera)
                // Instead of moving camera, we scale the universe to create the "God Mode" feel
                float scaleFactor = 1.0 + (uZoom * 5.0); // Expands significantly
                vec4 mvPosition = modelViewMatrix * vec4(pos * scaleFactor, 1.0);

                gl_Position = projectionMatrix * mvPosition;

                // 4. Visual Styling based on Physics

                // Size attenuation
                gl_PointSize = size * (300.0 / -mvPosition.z);

                // Brightness Logic (Requirement 7): Small=Dim, Big=Bright
                float brightnessBase = 0.35 + (uZoom * 0.8); // 0.35 to 1.15, slightly reduced center brightness

                // Chaos flicker
                if (chaosLevel > 0.0) {
                    brightnessBase += sin(uTime * 50.0) * 0.3 * chaosLevel;
                    gl_PointSize *= (1.0 + chaosLevel * 2.0); // Particles get huge in chaos
                }

                vAlpha = brightnessBase;

                // Color tinting - Core with rainbow, rings with subtle gradient colors
                if (radius < ${SATURN_RADIUS.toFixed(1)} + 1.0) {
                    // Core: Dynamic rainbow colors based on position and time
                    float hue = (pos.x + pos.y + pos.z) * 0.1 + uTime * 0.2;
                    vColor = hsv2rgb(vec3(fract(hue), 0.8, 1.0));
                } else {
                    // Rings: Subtle gradient colors with smooth transitions
                    float hue = (radius * 0.03) + (currentAngle * 0.05) + uTime * 0.05;
                    // Create pastel colors with lower saturation and higher value
                    vColor = hsv2rgb(vec3(fract(hue), 0.4, 0.9));
                }

                // Apply global brightness rule
                vColor *= brightnessBase;
            }
        `;

        const fragmentShader = `
            varying vec3 vColor;
            varying float vAlpha;

            void main() {
                // Soft circle particle
                float r = distance(gl_PointCoord, vec2(0.5, 0.5));
                if (r > 0.5) discard;

                // Soft edge glow
                float glow = 1.0 - (r * 2.0);
                glow = pow(glow, 1.5);

                gl_FragColor = vec4(vColor, vAlpha * glow);
            }
        `;

        // --- Initialization ---
        function init() {
            // 1. Scene Setup
            scene = new THREE.Scene();
            // Using a very subtle fog to fade distant particles
            scene.fog = new THREE.FogExp2(0x000000, 0.002);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 40, 150);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // 2. Particle Generation
            generateParticles();

            // 3. Post Processing (Bloom)
            const renderScene = new THREE.RenderPass(scene, camera);
            const bloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
            bloomPass.threshold = 0.1;
            bloomPass.strength = 1.8; // High glow for "Ultimate Visuals"
            bloomPass.radius = 0.5;

            composer = new THREE.EffectComposer(renderer);
            composer.addPass(renderScene);
            composer.addPass(bloomPass);

            // 4. Event Listeners
            window.addEventListener('resize', onWindowResize, false);
            const fsBtn = document.getElementById('fs-btn');
            if (fsBtn) {
                fsBtn.addEventListener('click', () => {
                    document.documentElement.requestFullscreen().catch((e) => console.log(e));
                });
            }

            // 5. Start Animation Loop
            animate();
        }

        function generateParticles() {
            const geometry = new THREE.BufferGeometry();
            const positions = [];
            const sizes = [];
            const speeds = []; // For Kepler
            const radii = [];
            const angleOffsets = [];
            const randomness = [];
            const randomDirs = [];

            for (let i = 0; i < PARTICLE_COUNT; i++) {
                let r, x, y, z, size, speed;

                // Distribution: 30% Core, 70% Rings
                const isCore = Math.random() < 0.3;

                if (isCore) {
                    // Sphere distribution
                    const theta = Math.random() * Math.PI * 2;
                    const phi = Math.acos((Math.random() * 2) - 1);
                    r = SATURN_RADIUS * Math.cbrt(Math.random()); // Even distribution in sphere

                    x = r * Math.sin(phi) * Math.cos(theta);
                    y = r * Math.sin(phi) * Math.sin(theta);
                    z = r * Math.cos(phi);

                    size = Math.random() * 1.5;
                    speed = 0.5; // Core rotates as a solid body roughly
                } else {
                    // Ring distribution (with gaps)
                    // Create Cassini Division approx and spread out particles more
                    r = RING_INNER + Math.random() * (RING_OUTER - RING_INNER);
                    // Gap between 55 and 60
                    if (r > 55 && r < 60) r = (Math.random() > 0.5) ? 55 : 60;
                    // Add slight random variation to prevent clustering
                    r += (Math.random() - 0.5) * 2.0; // ±2 unit variation

                    const theta = Math.random() * Math.PI * 2;

                    x = r * Math.cos(theta);
                    y = (Math.random() - 0.5) * 1.5; // Very flat
                    z = r * Math.sin(theta);

                    size = Math.random() * 2.0;

                    // Kepler's Law approximation: v ~ 1/sqrt(r)
                    // Closer = Faster
                    speed = 50.0 / Math.sqrt(r);
                }

                positions.push(x, y, z);
                sizes.push(size);
                speeds.push(speed);
                radii.push(r);
                angleOffsets.push(Math.atan2(z, x)); // Initial angle
                randomness.push(Math.random());
                randomDirs.push(Math.random()-0.5, Math.random()-0.5, Math.random()-0.5);
            }

            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            geometry.setAttribute('size', new THREE.Float32BufferAttribute(sizes, 1));
            geometry.setAttribute('speed', new THREE.Float32BufferAttribute(speeds, 1));
            geometry.setAttribute('radius', new THREE.Float32BufferAttribute(radii, 1));
            geometry.setAttribute('angleOffset', new THREE.Float32BufferAttribute(angleOffsets, 1));
            geometry.setAttribute('randomness', new THREE.Float32BufferAttribute(randomness, 1));
            geometry.setAttribute('randomDir', new THREE.Float32BufferAttribute(randomDirs, 3));

            uniforms = {
                uTime: { value: 0 },
                uZoom: { value: 0 },
                uChaosThreshold: { value: CHAOS_THRESHOLD }
            };

            const material = new THREE.ShaderMaterial({
                uniforms: uniforms,
                vertexShader: vertexShader,
                fragmentShader: fragmentShader,
                transparent: true,
                depthWrite: false,
                blending: THREE.AdditiveBlending
            });

            particleSystem = new THREE.Points(geometry, material);
            // Tilt Saturn slightly
            particleSystem.rotation.z = 25 * (Math.PI / 180);
            particleSystem.rotation.x = 10 * (Math.PI / 180);
            scene.add(particleSystem);
        }

        // --- Camera Permission and Initialization ---
        let cameraAllowed = false;
        const videoElement = document.getElementsByClassName('input_video')[0];
        let hands = null;
        let cameraUtils = null;

        async function initializeCamera() {
            try {
                console.log('Requesting camera access...');
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        width: { ideal: 640 },
                        height: { ideal: 480 },
                        facingMode: 'user'
                    }
                });
                console.log('Camera access granted');

                videoElement.srcObject = stream;

                // Ensure video plays
                videoElement.play().catch(e => console.log('Video play error:', e));

                return new Promise((resolve) => {
                    videoElement.onloadedmetadata = () => {
                        console.log('Video metadata loaded');
                        if (!hands) {
                            setTimeout(() => {
                                initializeHandTracking();
                            }, 500);
                        }
                        resolve();
                    };

                    // Fallback: resolve after timeout if onloadedmetadata doesn't fire
                    setTimeout(() => {
                        if (!hands) {
                            resolve();
                        }
                    }, 2000);
                });
            } catch (error) {
                console.error('Camera initialization error:', error);
                // Continue without camera - show message
                document.getElementById('status-indicator').textContent = '摄像头不可用';
                document.getElementById('status-indicator').classList.add('disconnected');
                throw error;
            }
        }

        async function initializeCameraAndTracking() {
            try {
                await initializeCamera();
            } catch (error) {
                console.log('Camera not available, continuing without hand tracking');
            }
        }

        // --- Hand Tracking Logic ---
        function onResults(results) {
            const loader = document.getElementById('loader');
            if (loader.style.opacity !== '0') {
                loader.style.opacity = 0;
                setTimeout(() => {
                    loader.classList.add('hidden');
                }, 500);
            }

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                isHandDetected = true;
                const landmarks = results.multiHandLandmarks[0];

                // Calculate hand openness based on average distance of fingertips to wrist
                const wrist = landmarks[0];
                const tips = [4, 8, 12, 16, 20]; // Thumb, Index, Middle, Ring, Pinky tips
                let avgDist = 0;

                tips.forEach(idx => {
                    const tip = landmarks[idx];
                    const d = Math.sqrt(Math.pow(tip.x - wrist.x, 2) + Math.pow(tip.y - wrist.y, 2));
                    avgDist += d;
                });
                avgDist /= 5;

                // Calibrate: Closed fist avgDist is approx 0.15, Open palm is approx 0.4
                // We map this to 0..1
                let openness = (avgDist - 0.15) * 3.5;
                openness = Math.max(0, Math.min(1, openness));

                // Smoothing with lerp
                targetZoom = openness;
            } else {
                isHandDetected = false;
                // Slowly return to base state if no hand
                targetZoom = 0;
            }
        }

        function initializeHandTracking() {
            try {
                console.log('Initializing hand tracking...');
                if (hands) {
                    hands.close();
                }

                hands = new Hands({locateFile: (file) => {
                    return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
                }});

                hands.setOptions({
                    maxNumHands: 1,
                    modelComplexity: 1, // 使用更精确的模型
                    minDetectionConfidence: 0.7, // 提高检测置信度要求
                    minTrackingConfidence: 0.7  // 提高追踪置信度要求
                });

                hands.onResults((results) => {
                    console.log('Hand tracking results received');
                    onResults(results);
                });

                cameraUtils = new Camera(videoElement, {
                    onFrame: async () => {
                        try {
                            await hands.send({image: videoElement});
                        } catch (error) {
                            console.error('Frame processing error:', error);
                        }
                    },
                    width: 640,
                    height: 480,
                    fps: 30
                });

                cameraUtils.start();
                console.log('Hand tracking initialized');
            } catch (error) {
                console.error('Hand tracking initialization error:', error);
            }
        }

        // Auto-initialize camera and hand tracking - only once
        if (!window.cameraInitialized) {
            window.cameraInitialized = true;
            setTimeout(() => {
                initializeCameraAndTracking();
            }, 1000);
        }

        // --- Control Buttons ---
        document.getElementById('settings-btn').addEventListener('click', () => {
            alert('设置功能开发中...');
        });

        document.getElementById('reset-btn').addEventListener('click', () => {
            targetZoom = 0;
            currentZoom = 0;
            if (uniforms) {
                uniforms.uZoom.value = 0;
            }
            document.getElementById('status-indicator').textContent = '已重置';
            setTimeout(() => {
                if (isHandDetected) {
                    document.getElementById('status-indicator').textContent = '摄像头已连接';
                } else if (!cameraAllowed) {
                    document.getElementById('status-indicator').textContent = '摄像头已禁用';
                } else {
                    document.getElementById('status-indicator').textContent = '摄像头已连接';
                }
            }, 2000);
        });

        // --- Animation Loop ---

        function animate() {
            requestAnimationFrame(animate);

            const time = performance.now() * 0.001;

            // Smooth Interpolation for Zoom
            // If hand is detected, we lerp to target. If not, we drift back.
            currentZoom += (targetZoom - currentZoom) * 0.05;

            if (uniforms) {
                uniforms.uTime.value = time;
                uniforms.uZoom.value = currentZoom;
            }

            // Slight camera drift for liveliness
            if (currentZoom < CHAOS_THRESHOLD) {
                camera.position.x = Math.sin(time * 0.2) * 20;
                camera.position.y = 40 + Math.cos(time * 0.15) * 10;
                camera.lookAt(0, 0, 0);
            } else {
                // Shake camera slightly during chaos
                camera.position.x += (Math.random() - 0.5) * 0.5;
                camera.position.y += (Math.random() - 0.5) * 0.5;
            }

            composer.render();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        }

        init();
    </script>
</body>
</html>
